{% extends 'taskmonitor/base.html' %}

{% block nav_links %}
    <a href="{% url 'monitoring:tasks' %}">My Tasks</a>
    <form method="post" action="{% url 'monitoring:logout' %}" style="display:inline">
        {% csrf_token %}
        <button type="submit" style="background:none;border:none;color:white;cursor:pointer;font-size:14px;opacity:.85;">Logout</button>
    </form>
{% endblock %}

{% block content %}
<h2>Submit Proof</h2>
<p class="subtitle">Upload photo evidence for your assigned task</p>

<div class="card" style="max-width: 520px;">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>Task</label>
            <select name="task">
                {% for task in tasks %}
                <option value="{{ task.id }}">{{ task.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Photo</label>
            <input type="file" name="image" accept="image/*" capture="environment">
            <div style="font-size:12px; color:#888; margin-top:4px;">On mobile this will open your camera directly.</div>
        </div>

        <div class="form-group">
            <label>GPS Location</label>
            <div style="display:flex; gap:8px;">
                <input type="text" name="latitude" id="lat" placeholder="Latitude" readonly>
                <input type="text" name="longitude" id="lng" placeholder="Longitude" readonly>
            </div>
            <button type="button" class="btn btn-secondary btn-sm" style="margin-top:8px;" onclick="getLocation()">
                📍 Get My Location
            </button>
            <div id="gps-status" style="font-size:12px; color:#888; margin-top:4px;"></div>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%">Submit Proof</button>
    </form>
</div>

<script>
function getLocation() {
    document.getElementById('gps-status').textContent = 'Getting location...';
    navigator.geolocation.getCurrentPosition(
        function(pos) {
            document.getElementById('lat').value = pos.coords.latitude.toFixed(6);
            document.getElementById('lng').value = pos.coords.longitude.toFixed(6);
            document.getElementById('gps-status').textContent = '✓ Location captured';
            document.getElementById('gps-status').style.color = '#16a34a';
        },
        function(err) {
            document.getElementById('gps-status').textContent = 'Could not get location. You can still submit.';
            document.getElementById('gps-status').style.color = '#dc2626';
        }
    );
}
</script>
{% endblock %}
