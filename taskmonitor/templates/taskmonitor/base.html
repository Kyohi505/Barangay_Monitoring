<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Monitoring System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f8;
            color: #222;
        }

        nav {
            background: #1a56db;
            color: white;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav .brand {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: .3px;
        }

        nav .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            opacity: .85;
        }

        nav .nav-links a:hover { opacity: 1; }

        .container {
            max-width: 960px;
            margin: 32px auto;
            padding: 0 20px;
        }

        h2 { font-size: 22px; margin-bottom: 6px; }
        h3 { font-size: 17px; margin-bottom: 12px; }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* CARDS */
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
        }

        /* TASK CARDS */
        .task-card {
            background: white;
            border-radius: 8px;
            padding: 18px 22px;
            margin-bottom: 14px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
            text-decoration: none;
            color: inherit;
            display: block;
            transition: box-shadow .15s;
        }

        .task-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.12); }

        .task-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .task-name { font-size: 16px; font-weight: 600; }
        .task-desc { font-size: 13px; color: #666; margin-top: 3px; }

        /* BADGES */
        .badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: .04em;
            white-space: nowrap;
        }

        .badge-pending    { background: #f0f0f0; color: #666; }
        .badge-in_progress { background: #dbeafe; color: #1d4ed8; }
        .badge-completed  { background: #dcfce7; color: #16a34a; }
        .badge-failed     { background: #fee2e2; color: #dc2626; }
        .badge-approved   { background: #dcfce7; color: #16a34a; }
        .badge-rejected   { background: #fee2e2; color: #dc2626; }
        .badge-validation { background: #ede9fe; color: #7c3aed; }
        .badge-non_validation { background: #fef3c7; color: #b45309; }

        /* PROGRESS BAR */
        .progress-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .progress-track {
            flex: 1;
            height: 6px;
            background: #e5e7eb;
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 99px;
            background: #1a56db;
            transition: width .3s;
        }

        .progress-fill.completed { background: #16a34a; }
        .progress-fill.failed    { background: #dc2626; }

        .progress-label { font-size: 12px; color: #666; white-space: nowrap; }

        /* TASK FOOTER */
        .task-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }

        /* FORMS */
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #444;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color .15s;
        }

        .form-group input:focus,
        .form-group select:focus { border-color: #1a56db; }

        /* BUTTONS */
        .btn {
            padding: 9px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            font-weight: 600;
            transition: background .15s;
        }

        .btn-primary { background: #1a56db; color: white; }
        .btn-primary:hover { background: #1648c0; }
        .btn-secondary { background: #f3f4f6; color: #374151; }
        .btn-secondary:hover { background: #e5e7eb; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th {
            text-align: left;
            padding: 10px 12px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: #666;
            border-bottom: 2px solid #e5e7eb;
        }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; }
        tr:last-child td { border-bottom: none; }

        /* SUBMISSIONS GRID */
        .submissions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .submission-item {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
            font-size: 12px;
        }

        .submission-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
        }

        .submission-item .sub-info {
            padding: 8px 10px;
            color: #666;
        }

        /* ALERTS */
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .alert-error { background: #fee2e2; color: #dc2626; }
        .alert-success { background: #dcfce7; color: #16a34a; }
        .alert-info { background: #dbeafe; color: #1d4ed8; }

        /* META INFO */
        .meta { font-size: 12px; color: #888; }
        .meta span { margin-right: 16px; }

        hr { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }

        .empty { text-align: center; padding: 32px; color: #999; font-size: 14px; }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 14px;
            color: #333;
        }
    </style>
</head>
<body>

<nav>
    <div class="brand">🏛 Barangay Monitoring System</div>
    <div class="nav-links">
        <a href="{% url 'monitoring:public' %}" style="color:white; text-decoration:none; margin-left:20px; font-size:14px; opacity:.85;">Home</a>
        <a href="{% url 'monitoring:equipment' %}" style="color:white; text-decoration:none; margin-left:20px; font-size:14px; opacity:.85;">Equipment</a>
        <a href="{% url 'monitoring:borrowing' %}">Borrowing</a>
        {% block nav_links %}{% endblock %}
    </div>
</nav>

<div class="container">
    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>

</body>
</html>
